controller_manager:
  ros__parameters:
    # Match physics rate (1000 Hz) for fastest possible arm disturbance response.
    # TurtleBot3 uses 1000 Hz; our previous 100 Hz gave 10ms control lag.
    update_rate: 1000
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # wheel_velocity_controller removed: diff_drive plugin controls wheels directly.


joint_state_broadcaster:
  ros__parameters:
    # Explicit list: excludes mimic joints generated internally by gazebo_ros2_control
    # (those are not in the URDF and cause MoveIt2 errors if broadcast).
    # Suspension joints omitted: they are fixed joints with no state interfaces.
    # Wheel joints are state-only (no command interface); still broadcast for TF/viz.
    joints:
      - front_left_joint
      - front_right_joint
      - back_left_joint
      - back_right_joint
      - Joint_1
      - Joint_2
      - Joint_3
      - Joint_4
      - Joint_5
      - Gripper
      - left_inner_back_joint
      - right_outer_back_joint
      - left_outer_back_joint
      - right_inner_front_joint
      - left_inner_front_joint
