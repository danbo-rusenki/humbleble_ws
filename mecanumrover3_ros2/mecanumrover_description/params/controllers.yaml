controller_manager:
  ros__parameters:
    # 1000 Hz でアームの外乱に最速応答 (Classic Gazebo と同様)
    update_rate: 1000
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Classic Gazebo の libgazebo_ros_diff_drive.so を置き換え
    # gz_ros2_control の速度 command_interface でホイールを制御
    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController


joint_state_broadcaster:
  ros__parameters:
    # ミミックジョイントを含む全ジョイントを明示 (固定ジョイントを除く)
    joints:
      - front_left_joint
      - front_right_joint
      - back_left_joint
      - back_right_joint
      - Joint_1
      - Joint_2
      - Joint_3
      - Joint_4
      - Joint_5
      - Gripper
      - left_inner_back_joint
      - right_outer_back_joint
      - left_outer_back_joint
      - right_inner_front_joint
      - left_inner_front_joint


mecanum_drive_controller:
  ros__parameters:
    # use_stamped_vel: false → ~/reference_unstamped (Twist) を購読 (デフォルト true = TwistStamped)
    # rover_twist_relay_ign が /rover_twist (Twist) を reference_unstamped へ転送するためここを false にする
    use_stamped_vel: false
    reference_timeout: 1.0

    # ホイールジョイント名 (mecanum3.xacro の joint 名と一致させる)
    front_left_wheel_command_joint_name: "front_left_joint"
    front_right_wheel_command_joint_name: "front_right_joint"
    rear_left_wheel_command_joint_name: "back_left_joint"
    rear_right_wheel_command_joint_name: "back_right_joint"

    kinematics:
      base_frame_offset: { x: 0.0, y: 0.0, theta: 0.0 }
      # ホイール半径 (mecanum3.xacro の cylinder radius=0.076 と一致)
      wheels_radius: 0.076
      # lx + ly: Classic Gazebo の wheel_separation=0.24 から lx=ly=0.12 として計算
      sum_of_robot_center_projection_on_X_Y_axis: 0.24

    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    enable_odom_tf: true
    publish_rate: 50.0
