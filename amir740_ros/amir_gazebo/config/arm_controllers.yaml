# AMIR アーム コントローラー設定 (Gazebo シミュレーション用)
# spawner -t <type> -p <this_file> で controller_manager に登録する

arm_controller:
  ros__parameters:
    joints:
      - Joint_1
      - Joint_2
      - Joint_3
      - Joint_4
      - Joint_5
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    open_loop_control: false
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0
    gains:
      Joint_1: {p: 50.0, i: 5.0, d: 1.0, i_clamp: 10.0}
      Joint_2: {p: 50.0, i: 5.0, d: 1.0, i_clamp: 10.0}
      Joint_3: {p: 50.0, i: 5.0, d: 1.0, i_clamp: 10.0}
      Joint_4: {p: 30.0, i: 3.0, d: 0.5, i_clamp: 5.0}
      Joint_5: {p: 10.0, i: 1.0, d: 0.2, i_clamp: 2.0}

gripper_controller:
  ros__parameters:
    joint: Gripper
    allow_stalling: true
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
    goal_tolerance: 0.01
    max_effort: 10.0
